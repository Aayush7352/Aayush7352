name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: output-branch
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange&color_dots=#EBEDF0,#9BE9A8,#40C463,#30A14E,#216E39
            dist/github-contribution-grid-snake-dark.svg?color_snake=orange&color_dots=#161B22,#0E4429,#006D32,#26A641,#39D353&palette=github-dark

      - name: Publish to output branch (preserving 3D SVGs)
        run: |
          set -euxo pipefail

          STAGING="$RUNNER_TEMP/snake"
          mv dist "$STAGING"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch origin output
            git worktree add out-branch origin/output
            cd out-branch
            git checkout -B output
          else
            git worktree add --detach out-branch
            cd out-branch
            git checkout --orphan output
            git rm -rf . || true
          fi

          # Overlay generated snake SVGs on top of existing files (preserves 3D SVGs)
          cp -f "$STAGING"/*.svg .

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update contribution snake [skip ci]"
            git push origin output
          fi
